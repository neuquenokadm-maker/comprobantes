<script>
  // ─── CONFIGURACIÓN ───────────────────────────────────────────────
  const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbznQLZ2fLr-6wOvDbfNvPQehKQL7LTZPpjy9bhrJ3roBeWDttRx0JQcS9PnW9pZGrpY/exec"; 
  const GEMINI_API_KEY    = "AIzaSyCR4eRHI3deG9zb1CQdL3hbGC1RTNKokBI"; // Recomiendo generar una nueva si esta fue anulada
  // ──────────────────────────────────────────────────────────────────

  let archivoSeleccionado = null;

  // Drag & drop logic
  const dz = document.getElementById('dropzone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) setFile(f);
  });

  function handleFile(input) {
    if (input.files[0]) setFile(input.files[0]);
  }

  function setFile(file) {
    if (file.size > 10 * 1024 * 1024) {
      showStatus('El archivo supera los 10 MB.', 'error');
      return;
    }
    archivoSeleccionado = file;
    document.getElementById('fname').textContent = file.name;
    document.getElementById('file-preview').classList.add('show');
    dz.style.display = 'none';
  }

  function removeFile() {
    archivoSeleccionado = null;
    document.getElementById('file-preview').classList.remove('show');
    document.getElementById('archivo').value = '';
    dz.style.display = '';
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = `status show ${type}`;
  }

  function hideStatus() {
    document.getElementById('status').className = 'status';
  }

  function toBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }

  function esperar(ms) {
    return new Promise(res => setTimeout(res, ms));
  }

  // Llamada a Gemini corregida (Modelo 1.5 Flash)
  async function llamarGemini(body, intento = 1) {
    const resp = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,
      { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
    );

    const data = await resp.json();

    if (!resp.ok) {
      const errMsg = data?.error?.message || '';
      const esQuota = resp.status === 429 || errMsg.includes('quota');

      if (esQuota && intento <= 3) {
        const segundos = intento * 5;
        showStatus(`⏳ Reintentando en ${segundos}s...`, 'success');
        await esperar(segundos * 1000);
        return llamarGemini(body, intento + 1);
      }
      throw new Error(errMsg || 'Error en la API de IA');
    }
    return data;
  }

  async function extraerDatos(file) {
    const base64 = await toBase64(file);
    let mimeType = file.type || 'image/jpeg';

    const prompt = `Sos un asistente especializado en comprobantes argentinos. Extraé en JSON: numero_foto, fecha, hora, coelsa, monto, cuit, nombre_depositante, banco_depositante, nombre_receptor. Solo el JSON, sin texto extra.`;

    const body = {
      contents: [{
        parts: [
          { text: prompt },
          { inline_data: { mime_type: mimeType, data: base64 } }
        ]
      }]
    };

    const data = await llamarGemini(body);
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
    const clean = text.replace(/```json|```/g, '').trim();
    return JSON.parse(clean);
  }

  async function enviarASheets(payload) {
    const resp = await fetch(GOOGLE_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    if (!resp.ok) throw new Error('No se pudo conectar con la planilla');
    return resp.json();
  }

  async function enviar() {
    hideStatus();
    const nombre = document.getElementById('nombre').value.trim();
    const celular = document.getElementById('celular').value.trim();

    if (!nombre || !celular || !archivoSeleccionado) {
      showStatus('Completá todos los campos.', 'error');
      return;
    }

    const btn = document.getElementById('btn-submit');
    btn.classList.add('loading');
    btn.disabled = true;

    try {
      showStatus('🤖 Analizando con IA...', 'success');
      const datosComprobante = await extraerDatos(archivoSeleccionado);
      
      showStatus('📤 Subiendo comprobante...', 'success');
      const base64Archivo = await toBase64(archivoSeleccionado);
      
      const payload = {
        nombre_cliente: nombre,
        celular_cliente: celular,
        fecha_carga: new Date().toLocaleString('es-AR'),
        archivo_base64: base64Archivo,
        archivo_nombre: archivoSeleccionado.name,
        archivo_tipo: archivoSeleccionado.type || 'image/jpeg',
        ...datosComprobante
      };

      await enviarASheets(payload);

      document.getElementById('form-section').style.display = 'none';
      document.getElementById('success-screen').classList.add('show');
    } catch (err) {
      showStatus('Error: ' + err.message, 'error');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  function resetForm() {
    location.reload(); // Recarga simple para limpiar todo
  }
</script>
